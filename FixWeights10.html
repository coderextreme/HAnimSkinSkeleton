<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X3D Rig Fixer: Closest Skin Auto-Fitter</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f4f9; }
        .container { max-width: 750px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { padding: 10px 15px; background: #0078D7; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px;}
        button:disabled { background: #ccc; cursor: not-allowed; }
        .options { margin-top: 15px; padding: 15px; background: #eef; border-radius: 4px; }
        label { display: block; margin-bottom: 8px; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; color: #333; line-height: 1.5; }
        .progress-bar { width: 100%; background: #ddd; height: 12px; border-radius: 6px; margin-top: 10px; overflow: hidden; display: none; }
        .progress-fill { height: 100%; background: #0078D7; width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div class="container">
    <h2>X3D Rigging Fixer (Multi-Mesh Support)</h2>
    <p>Select your X3D file. This script parses all separated meshes (body, pants, hands), auto-centers bones inside the <b>closest</b> skin boundary, and fixes rigging line-of-sight.</p>
    
    <div class="options">
        <label><input type="checkbox" id="chkAutoFit" checked> <b>Enable Auto-Fitter:</b> Move bones that are outside the mesh precisely into the middle of the closest assigned skin.</label>
        <label><input type="checkbox" id="chkCull" checked> <b>Enable Line-of-Sight Culler:</b> Remove weights that cross boundaries (with a 5cm tolerance for layered clothing).</label>
    </div>

    <input type="file" id="fileInput" accept=".x3d,.xml" />
    <br>
    <button id="processBtn" disabled>Process and Download</button>
    <div id="status"></div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    let originalFilename = "fixed_model.x3d";

    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            originalFilename = e.target.files[0].name.replace('.x3d', '_Fixed.x3d');
            processBtn.disabled = false;
        }
    });

    processBtn.addEventListener('click', function() {
        const file = fileInput.files[0];
        const reader = new FileReader();
        const useAutoFit = document.getElementById('chkAutoFit').checked;
        const useCuller = document.getElementById('chkCull').checked;
        
        statusDiv.innerText = "Parsing XML... Please wait.";
        processBtn.disabled = true;
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        
        reader.onload = async function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            
            try {
                await processRigging(xmlDoc, useAutoFit, useCuller);
                
                const serializer = new XMLSerializer();
                let outStr = serializer.serializeToString(xmlDoc);
                
                if (!outStr.startsWith("<?xml")) outStr = "<?xml version='1.0' encoding='utf-8'?>\n" + outStr;

                const blob = new Blob([outStr], { type: "text/xml" });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = originalFilename;
                a.click();
                URL.revokeObjectURL(url);
                
                statusDiv.innerHTML += "<br><span style='color:green;'>Done! File downloaded as " + originalFilename + "</span>";
                progressFill.style.width = '100%';
            } catch (err) {
                console.error(err);
                statusDiv.innerHTML += "<br><span style='color:red;'>Error processing file: " + err.message + "</span>";
            }
            processBtn.disabled = false;
        };
        
        reader.readAsText(file);
    });

    // --- Core Helpers ---
    function parseX3DArray(str) {
        if (!str) return [];
        return str.replace(/,/g, ' ').trim().split(/\s+/).filter(s => s !== '').map(Number);
    }

    function sub(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
    function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
    function dot(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }
    function dist(a, b) { return Math.hypot(a[0]-b[0], a[1]-b[1], a[2]-b[2]); }
    function normalize(a) { let len = Math.hypot(a[0], a[1], a[2]); return len === 0 ? [0,0,0] : [a[0]/len, a[1]/len, a[2]/len]; }

    function intersectRayTriangle(O, D, V0, V1, V2) {
        const EPSILON = 1e-6;
        let edge1 = sub(V1, V0); let edge2 = sub(V2, V0);
        let h = cross(D, edge2); let a = dot(edge1, h);
        if (a > -EPSILON && a < EPSILON) return null; 
        
        let f = 1.0 / a; let s = sub(O, V0); let u = f * dot(s, h);
        if (u < 0.0 || u > 1.0) return null;
        
        let q = cross(s, edge1); let v = f * dot(D, q);
        if (v < 0.0 || u + v > 1.0) return null;
        
        let t = f * dot(edge2, q);
        if (t > EPSILON) return t; 
        return null;
    }

    // Collects ALL intersections in a given direction, returning sorted unique distances
    function getRayIntersections(O, D, triangles, vertices) {
        let hits = [];
        for (let i = 0; i < triangles.length; i++) {
            let t = intersectRayTriangle(O, D, vertices[triangles[i][0]], vertices[triangles[i][1]], vertices[triangles[i][2]]);
            if (t !== null && t > 0.0001) hits.push(t);
        }
        hits.sort((a,b) => a - b);
        
        // Filter out duplicate hits (like hitting a shared edge between 2 triangles)
        let uniqueHits = [];
        for (let i = 0; i < hits.length; i++) {
            if (i === 0 || (hits[i] - uniqueHits[uniqueHits.length - 1]) > 0.001) {
                uniqueHits.push(hits[i]);
            }
        }
        return uniqueHits;
    }

    function isInsideMesh(O, triangles, vertices) {
        let dir = normalize([1.0, 0.00123, 0.00321]);
        let hits = getRayIntersections(O, dir, triangles, vertices);
        return (hits.length % 2 !== 0); // Odd = Inside, Even/0 = Outside
    }

    function getWeightedCentroid(jName, vertexWeights, vertices) {
        let sum = [0, 0, 0]; let totalW = 0;
        for (let vIdx in vertexWeights) {
            let w = vertexWeights[vIdx][jName];
            if (w !== undefined && vertices[vIdx]) {
                sum[0] += vertices[vIdx][0]*w; sum[1] += vertices[vIdx][1]*w; sum[2] += vertices[vIdx][2]*w; totalW += w;
            }
        }
        if (totalW === 0) return null;
        return [sum[0]/totalW, sum[1]/totalW, sum[2]/totalW];
    }

    async function processRigging(doc, doAutoFit, doCull) {
        // 1. Extract ALL Coordinate nodes (Body, Pants, Hands, etc) robustly
        const allCoords = doc.querySelectorAll('Coordinate');
        if (allCoords.length === 0) throw new Error("Could not find any <Coordinate> nodes in the file.");

        const vertices = [];
        const coordOffsets = new Map(); 

        allCoords.forEach(c => {
            coordOffsets.set(c, vertices.length);
            const pts = parseX3DArray(c.getAttribute('point'));
            for (let i = 0; i < pts.length; i += 3) {
                if (pts[i+2] !== undefined) vertices.push([pts[i], pts[i+1], pts[i+2]]);
            }
        });
        const totalVerticesCount = vertices.length;

        // 2. Extract Triangles globally correctly offset
        const faceSets = doc.querySelectorAll('IndexedFaceSet');
        let rawTriangles = [];
        
        faceSets.forEach(ifs => {
            let localCoord = ifs.querySelector('Coordinate');
            if (!localCoord) {
                let useNode = ifs.querySelector('Coordinate[USE]');
                if (useNode) localCoord = doc.querySelector(`Coordinate[DEF="${useNode.getAttribute('USE')}"]`);
            }
            
            let offset = (localCoord && coordOffsets.has(localCoord)) ? coordOffsets.get(localCoord) : 0;
            const indices = parseX3DArray(ifs.getAttribute('coordIndex'));
            
            if (indices.length > 0) {
                let poly = [];
                for (let i = 0; i < indices.length; i++) {
                    if (indices[i] === -1) {
                        if (poly.length >= 3) {
                            for (let j = 1; j < poly.length - 1; j++) rawTriangles.push([poly[0] + offset, poly[j] + offset, poly[j+1] + offset]);
                        }
                        poly = [];
                    } else {
                        poly.push(indices[i]);
                    }
                }
                if (poly.length >= 3) {
                    for (let j = 1; j < poly.length - 1; j++) rawTriangles.push([poly[0] + offset, poly[j] + offset, poly[j+1] + offset]);
                }
            }
        });

        // 2.5 SAFETY CHECK: Filter out invalid triangles
        const triangles = [];
        rawTriangles.forEach(t => {
            if (vertices[t[0]] !== undefined && vertices[t[1]] !== undefined && vertices[t[2]] !== undefined) triangles.push(t);
        });

        const triBounds = triangles.map(t => {
            let v0 = vertices[t[0]], v1 = vertices[t[1]], v2 = vertices[t[2]];
            return [
                Math.min(v0[0], v1[0], v2[0]), Math.max(v0[0], v1[0], v2[0]),
                Math.min(v0[1], v1[1], v2[1]), Math.max(v0[1], v1[1], v2[1]),
                Math.min(v0[2], v1[2], v2[2]), Math.max(v0[2], v1[2], v2[2])
            ];
        });

        // 3. Cache Weights and Wipe Original DOM
        const joints = doc.querySelectorAll('HAnimJoint');
        let vertexWeights = {};
        
        joints.forEach(joint => {
            const jName = joint.getAttribute('name');
            const idxStr = joint.getAttribute('skinCoordIndex');
            const wtStr = joint.getAttribute('skinCoordWeight');
            
            if (jName && jName.toLowerCase() !== 'humanoid_root' && idxStr && wtStr) {
                const indices = parseX3DArray(idxStr);
                const weights = parseX3DArray(wtStr);
                
                for (let i = 0; i < indices.length; i++) {
                    let vIdx = indices[i];
                    if (vIdx >= 0 && vIdx < totalVerticesCount && weights[i] !== undefined) {
                        if (!vertexWeights[vIdx]) vertexWeights[vIdx] = {};
                        vertexWeights[vIdx][jName] = weights[i];
                    }
                }
            }
            joint.removeAttribute('skinCoordIndex');
            joint.removeAttribute('skinCoordWeight');
        });

        // 4. Closest-Skin Auto-Fitter
        let jointCentersMap = {}; 
        let movedCount = 0;
        
        joints.forEach(joint => {
            let jName = joint.getAttribute('name');
            if (!jName) return;
            let JC = parseX3DArray(joint.getAttribute('center') || "0 0 0");

            if (doAutoFit && jName.toLowerCase() !== 'humanoid_root' && JC.length === 3) {
                if (!isInsideMesh(JC, triangles, vertices)) {
                    
                    // A. Find the absolute closest vertex assigned to this joint
                    let closestV = null;
                    let minDist = Infinity;
                    
                    for (let vIdx in vertexWeights) {
                        if (vertexWeights[vIdx][jName] !== undefined && vertices[vIdx]) {
                            let d = dist(JC, vertices[vIdx]);
                            if (d < minDist) {
                                minDist = d;
                                closestV = vertices[vIdx];
                            }
                        }
                    }

                    if (closestV) {
                        // B. Cast a ray toward that nearest skin
                        let dir = normalize(sub(closestV, JC));
                        let hits = getRayIntersections(JC, dir, triangles, vertices);

                        if (hits.length >= 2) {
                            // C. Place exactly in the middle of the skin's entry and exit point
                            let midT = (hits[0] + hits[1]) / 2.0;
                            JC = [JC[0] + dir[0]*midT, JC[1] + dir[1]*midT, JC[2] + dir[2]*midT];
                            movedCount++;
                        } else if (hits.length === 1) {
                            // C (Fallback): Penetrate 2cm inward past the skin surface
                            let midT = hits[0] + 0.02;
                            JC = [JC[0] + dir[0]*midT, JC[1] + dir[1]*midT, JC[2] + dir[2]*midT];
                            movedCount++;
                        } else {
                            // C (Failsafe): If raycasting glitches, fallback to Centroid
                            let centroid = getWeightedCentroid(jName, vertexWeights, vertices);
                            if (centroid) { JC = centroid; movedCount++; }
                        }
                        joint.setAttribute('center', JC.map(n => n.toFixed(5)).join(" "));
                    }
                }
            }
            jointCentersMap[jName] = JC;
        });

        let culledCount = 0;
        let ruleBreaks = 0;

        // 5. Line-of-Sight Culler
        if (doCull) {
            let occlusions = {}; 
            for (let i = 0; i < joints.length; i++) {
                let joint = joints[i];
                let jName = joint.getAttribute('name');
                if (!jName || jName.toLowerCase() === 'humanoid_root') continue;

                let JC = jointCentersMap[jName];
                if (!JC || JC.length < 3) continue;

                let assignedVertices = [];
                for (let vIdx in vertexWeights) {
                    if (vertexWeights[vIdx][jName] !== undefined) assignedVertices.push(parseInt(vIdx));
                }

                statusDiv.innerHTML = `Raycasting joint ${i+1} of ${joints.length} (${jName})...`;
                progressFill.style.width = `${(i / joints.length) * 100}%`;
                await new Promise(r => setTimeout(r, 0)); 

                for (let vIdx of assignedVertices) {
                    let VTarget = vertices[vIdx];
                    let maxDist = dist(JC, VTarget);
                    let dir = normalize(sub(VTarget, JC));
                    
                    let segMinX = Math.min(JC[0], VTarget[0]) - 0.001; let segMaxX = Math.max(JC[0], VTarget[0]) + 0.001;
                    let segMinY = Math.min(JC[1], VTarget[1]) - 0.001; let segMaxY = Math.max(JC[1], VTarget[1]) + 0.001;
                    let segMinZ = Math.min(JC[2], VTarget[2]) - 0.001; let segMaxZ = Math.max(JC[2], VTarget[2]) + 0.001;

                    let occluded = false;

                    for (let tIdx = 0; tIdx < triangles.length; tIdx++) {
                        let tri = triangles[tIdx];
                        if (tri[0] === vIdx || tri[1] === vIdx || tri[2] === vIdx) continue;
                        let b = triBounds[tIdx];
                        if (segMaxX < b[0] || segMinX > b[1] || segMaxY < b[2] || segMinY > b[3] || segMaxZ < b[4] || segMinZ > b[5]) continue;

                        let v0 = vertices[tri[0]], v1 = vertices[tri[1]], v2 = vertices[tri[2]];
                        let t = intersectRayTriangle(JC, dir, v0, v1, v2);

                        if (t !== null && t > 0.0001 && t < maxDist - 0.05) {
                            occluded = true;
                            break; 
                        }
                    }

                    if (occluded) {
                        if (!occlusions[vIdx]) occlusions[vIdx] = [];
                        occlusions[vIdx].push(jName);
                    }
                }
            }

            for (let vIdx in occlusions) {
                let occludedJoints = occlusions[vIdx];
                let allAssignedJoints = Object.keys(vertexWeights[vIdx]);

                if (occludedJoints.length === allAssignedJoints.length) {
                    let bestJoint = occludedJoints[0];
                    let maxWeight = vertexWeights[vIdx][bestJoint];
                    
                    for (let j = 1; j < occludedJoints.length; j++) {
                        let w = vertexWeights[vIdx][occludedJoints[j]];
                        if (w > maxWeight) { maxWeight = w; bestJoint = occludedJoints[j]; }
                    }

                    for (let jName of occludedJoints) {
                        if (jName !== bestJoint) {
                            delete vertexWeights[vIdx][jName];
                            culledCount++;
                        }
                    }
                    ruleBreaks++;
                } else {
                    for (let jName of occludedJoints) {
                        delete vertexWeights[vIdx][jName];
                        culledCount++;
                    }
                }
            }
        }

        // 6. Normalize & Output
        statusDiv.innerHTML = `Formatting Output...`;
        await new Promise(r => setTimeout(r, 0));

        let finalJointData = {}; 
        for (let vIdx in vertexWeights) {
            let jDict = vertexWeights[vIdx];
            let totalWeight = 0;
            for (let jName in jDict) totalWeight += jDict[jName];
            
            if (totalWeight > 0) {
                for (let jName in jDict) {
                    let normWeight = jDict[jName] / totalWeight;
                    if (!finalJointData[jName]) finalJointData[jName] = { indices: [], weights: [] };
                    finalJointData[jName].indices.push(vIdx);
                    finalJointData[jName].weights.push(normWeight.toFixed(5));
                }
            }
        }

        const allVerticesArray = Array.from({length: totalVerticesCount}, (_, i) => i);

        joints.forEach(joint => {
            const jointName = joint.getAttribute('name');
            if (!jointName) return;
            
            if (jointName.toLowerCase() === 'humanoid_root') {
                if (totalVerticesCount > 0) {
                    joint.setAttribute('skinCoordIndex', allVerticesArray.join(" "));
                    joint.setAttribute('skinCoordWeight', allVerticesArray.map(() => "1.0").join(" "));
                }
                return; 
            }

            if (finalJointData[jointName] && finalJointData[jointName].indices.length > 0) {
                joint.setAttribute('skinCoordIndex', finalJointData[jointName].indices.join(" "));
                joint.setAttribute('skinCoordWeight', finalJointData[jointName].weights.join(" "));
            }
        });
        
        console.log(`Fitted ${movedCount} joints. Culled ${culledCount} weights. Orphan saves: ${ruleBreaks}. Vertices: ${totalVerticesCount}`);
    }
</script>

</body>
</html>
